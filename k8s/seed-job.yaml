# One-shot Job to populate the registry before the Deployment serves traffic.
# Run after the PVC exists:  kubectl apply -f deploy/k8s/pvc.yaml -f deploy/k8s/seed-job.yaml
apiVersion: batch/v1
kind: Job
metadata:
  name: mixle-seed
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: seed
          image: <your-registry>/mixle-mlops:latest
          command: ["mixle-seed"]
          env:
            - { name: MIXLE_REGISTRY_ROOT, value: /models }
            - { name: MIXLE_MODEL_NAME, value: model }
          volumeMounts:
            - { name: registry, mountPath: /models }
      volumes:
        - name: registry
          persistentVolumeClaim:
            claimName: mixle-registry
