# Scheduled drift check + retrain-and-swap. Writes a new version + flips the production alias when drift
# is detected; the serving pods adopt it on the next rolling restart (or /reload).
#
# To let this CronJob trigger the rollout itself, give its ServiceAccount RBAC to patch the deployment and
# add a final step:  kubectl rollout restart deployment/pysp-model  (omitted here to keep RBAC minimal).
apiVersion: batch/v1
kind: CronJob
metadata:
  name: pysp-drift-retrain
spec:
  schedule: "0 3 * * *" # daily at 03:00
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: drift-retrain
              image: <your-registry>/pysparkplug-deploy:latest
              command: ["pysp-drift-retrain"]
              env:
                - { name: PYSP_REGISTRY_ROOT, value: /models }
                - { name: PYSP_MODEL_NAME, value: model }
                # - { name: PYSP_RECENT_BATCH_PATH, value: /data/recent.json }  # wire to your data store
              volumeMounts:
                - { name: registry, mountPath: /models }
          volumes:
            - name: registry
              persistentVolumeClaim:
                claimName: pysp-registry
