# Stateless scoring replicas. Each loads the production model from the shared registry at startup;
# /health backs the k8s probes. Scale with `replicas` (or an HPA on CPU). A model swap is:
#   registry.promote(...)  ->  kubectl rollout restart deployment/pysp-model   (or POST /reload per pod)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pysp-model
  labels: { app: pysp-model }
spec:
  replicas: 3
  selector:
    matchLabels: { app: pysp-model }
  template:
    metadata:
      labels: { app: pysp-model }
    spec:
      containers:
        - name: server
          image: <your-registry>/pysparkplug-deploy:latest
          ports:
            - containerPort: 8000
          env:
            - { name: PYSP_REGISTRY_ROOT, value: /models }
            - { name: PYSP_MODEL_NAME, value: model }
            - { name: PYSP_MODEL_ALIAS, value: production }
            - { name: PYSP_REFERENCE_PATH, value: /models/model/reference.json }
            - { name: PYSP_ACTIVITY_LOG, value: /dev/stdout }
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests: { cpu: "250m", memory: 256Mi }
            limits: { cpu: "1", memory: 512Mi }
          volumeMounts:
            - { name: registry, mountPath: /models, readOnly: true }
      volumes:
        - name: registry
          persistentVolumeClaim:
            claimName: pysp-registry
