# ClusterIP Service load-balancing across the scoring replicas. Expose externally with an Ingress or
# by switching type to LoadBalancer.
apiVersion: v1
kind: Service
metadata:
  name: mixle-model
spec:
  selector: { app: mixle-model }
  ports:
    - name: http
      port: 80
      targetPort: 8000
  type: ClusterIP
