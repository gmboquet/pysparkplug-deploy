apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mixle-mlops.fullname" . }}-config
  labels:
    {{- include "mixle-mlops.labels" . | nindent 4 }}
data:
  MIXLE_DEPLOYMENT: {{ if .Values.database.url }}"cloud"{{ else }}"local"{{ end }}
  MIXLE_DATA_DIR: {{ .Values.persistence.mountPath | quote }}
  MIXLE_REQUIRE_AUTH: {{ .Values.requireAuth | quote }}
  MIXLE_CORS_ORIGINS: {{ .Values.corsOrigins | quote }}
  MIXLE_LLM_BASE_URL: {{ .Values.llm.baseUrl | quote }}
  MIXLE_LLM_API_KEY: {{ .Values.llm.apiKey | quote }}
  MIXLE_LLM_MODELS: {{ .Values.llm.models | quote }}
  MIXLE_LLM_BACKENDS: {{ .Values.llm.backends | quote }}
  MIXLE_DEFAULT_MODEL: {{ .Values.llm.defaultModel | quote }}
  {{- if .Values.objectStore.url }}
  MIXLE_OBJECT_STORE_URL: {{ .Values.objectStore.url | quote }}
  {{- else }}
  MIXLE_OBJECT_STORE_URL: {{ printf "file://%s/objects" .Values.persistence.mountPath | quote }}
  {{- end }}
  {{- if .Values.objectStore.endpoint }}
  MIXLE_OBJECT_STORE_ENDPOINT: {{ .Values.objectStore.endpoint | quote }}
  {{- end }}
  {{- if .Values.objectStore.region }}
  MIXLE_OBJECT_STORE_REGION: {{ .Values.objectStore.region | quote }}
  {{- end }}
  {{- range $k, $v := .Values.extraEnv }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
