# Sensitive gateway config. DO NOT commit real values — this is a template.
# Create for real with:
#   kubectl create secret generic mixle-gateway-secret \
#     --from-literal=MIXLE_SECRET_KEY="$(python -c 'import secrets;print(secrets.token_urlsafe(48))')"
# In cloud mode also add:  --from-literal=MIXLE_DATABASE_URL=postgresql+psycopg://user:pass@host:5432/mixle
apiVersion: v1
kind: Secret
metadata:
  name: mixle-gateway-secret
  labels: { app: mixle-gateway }
type: Opaque
stringData:
  MIXLE_SECRET_KEY: "change-me-please-generate-a-real-secret"
  # MIXLE_DATABASE_URL: "postgresql+psycopg://mixle:mixle@mixle-postgres:5432/mixle"
