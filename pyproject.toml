[build-system]
requires = ["setuptools>=77", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "pysparkplug-deploy"
version = "0.1.0"
description = "Container / Kubernetes serving layer for pysparkplug models (FastAPI over ModelService)."
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
authors = [{ name = "Grant Boquet" }]
dependencies = [
    # The model primitives (ModelRegistry / ModelService / drift). Published on PyPI as `pysp-learn`;
    # until then install it from git (see README / Dockerfile).
    "pysp-learn>=0.2",
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "pydantic>=2",
]

[project.optional-dependencies]
dev = ["ruff==0.15.17", "httpx>=0.27", "pytest>=8"]

[project.scripts]
pysp-serve = "pysparkplug_deploy.app:main"
pysp-seed = "pysparkplug_deploy.seed_registry:main"
pysp-drift-retrain = "pysparkplug_deploy.drift_retrain:main"

[project.urls]
Homepage = "https://github.com/gmboquet/pysparkplug-deploy"
Core = "https://github.com/gmboquet/pysparkplug"

[tool.setuptools.packages.find]
include = ["pysparkplug_deploy*"]

[tool.ruff]
line-length = 118
